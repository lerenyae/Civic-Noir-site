    className: '',
    html: `<div class="custom-pin" id="pin-${id}"><div class="pin-inner"></div></div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 14],
    popupAnchor: [0, -18]
  });
}

function buildPopupHTML(loc) {
  return `<div class="map-popup">
    <div class="map-popup-tag">${loc.tag}</div>
    <div class="map-popup-name">${loc.name}</div>
    <div class="map-popup-sub">${loc.excerpt}</div>
  </div>`;
}

function openDetail(loc) {
  document.getElementById('detailTag').textContent = loc.tag;
  document.getElementById('detailName').textContent = loc.name;
  document.getElementById('detailAddress').textContent = loc.address;
  document.getElementById('detailBody').innerHTML = loc.body;
  document.getElementById('detailChapter').textContent = loc.chapter;
  document.getElementById('detailPanel').classList.add('open');

  // Sidebar highlight
  document.querySelectorAll('.location-item').forEach(el => el.classList.remove('active'));
  const listItem = document.getElementById(`item-${loc.id}`);
  if (listItem) {
    listItem.classList.add('active');
    listItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // Fly to location
  map.flyTo([loc.lat, loc.lng], 15, { duration: 1.2, easeLinearity: 0.4 });

  activeId = loc.id;
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  document.querySelectorAll('.location-item').forEach(el => el.classList.remove('active'));
  activeId = null;
}

// Add markers
LOCATIONS.forEach(loc => {
  const marker = L.marker([loc.lat, loc.lng], { icon: createPinIcon(loc.id) });

  marker.bindPopup(buildPopupHTML(loc), {
    maxWidth: 260,
    className: 'contempt-popup'
  });

  marker.on('click', () => {
    map.closePopup();
    openDetail(loc);
  });

  marker.on('mouseover', function() {
    this.openPopup();
  });

  marker.on('mouseout', function() {
    this.closePopup();
  });

  marker.addTo(map);
  markers[loc.id] = marker;
});

// Build sidebar list
function buildList(filter) {
  const list = document.getElementById('locationList');
  list.innerHTML = '';

  const filtered = filter === 'all' ? LOCATIONS : LOCATIONS.filter(l => l.filter === filter);

  filtered.forEach(loc => {
    const item = document.createElement('div');
    item.className = 'location-item';
    item.id = `item-${loc.id}`;
    item.innerHTML = `
      <div class="loc-tag"><span class="loc-tag-dot"></span>${loc.tag}</div>
      <div class="loc-name">${loc.name}</div>
      <div class="loc-excerpt">${loc.excerpt}</div>
    `;
    item.addEventListener('click', () => openDetail(loc));
    list.appendChild(item);
  });
}

buildList('all');

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    buildList(activeFilter);
    closeDetail();

    // Show/hide markers
    LOCATIONS.forEach(loc => {
      if (activeFilter === 'all' || loc.filter === activeFilter) {
        markers[loc.id].addTo(map);
      } else {
        map.removeLayer(markers[loc.id]);
      }
    });

    // Fly to zone center or fit bounds
    if (activeFilter === 'baltimore') {
      map.flyTo([39.29, -76.615], 13, { duration: 1.2 });
    } else if (activeFilter === 'ocean-city') {
      map.flyTo([38.34, -75.08], 14, { duration: 1.2 });
    } else if (activeFilter === 'snow-hill') {
      map.flyTo([38.177, -75.39], 14, { duration: 1.2 });
    } else if (activeFilter === 'all') {
      // Fit bounds to all locations with padding
      const allBounds = LOCATIONS.map(l => [l.lat, l.lng]);
      map.fitBounds(allBounds, { padding: [60, 60], maxZoom: 12, duration: 1.2 });
    }
  });
});

// Close detail
document.getElementById('detailClose').addEventListener('click', closeDetail);

// Close on map click
map.on('click', closeDetail);
</script>
</body>
</html>

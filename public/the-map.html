<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The City &mdash; Contempt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #080808;
      --ink: #1a1814;
      --bone: #d4cfc4;
      --bone-bright: #f0ece3;
      --gold: #B8963E;
      --gold-dim: #8a6e2a;
      --steel: #4a8ec2;
      --steel-dim: #34658a;
      --red: #c44a2a;
      --red-dim: #8a3520;
      --muted: #5a5448;
      --panel: #0f0e0b;
      --border: #1e1c18;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-ui: 'Outfit', sans-serif;
    }

    html, body { height: 100%; background: var(--black); color: var(--bone); font-family: var(--font-ui); overflow: hidden; overflow-x: hidden; max-width: 100vw; }

    /* — NAV — */
    .site-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: var(--black); border-bottom: 1px solid var(--border);
      padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; height: 52px;
    }
    .nav-brand { font-family: var(--font-ui); font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); text-decoration: none; }
    .nav-center { position: absolute; left: 50%; transform: translateX(-50%); font-family: var(--font-serif); font-size: 0.95rem; font-weight: 300; color: var(--bone-bright); letter-spacing: 0.08em; }
    .nav-center em { font-style: italic; color: #8a8070; }
    .nav-right { font-family: var(--font-ui); font-size: 0.55rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); }

    /* — LAYOUT — */
    .layout { display: flex; height: 100vh; padding-top: 52px; }

    /* — SIDEBAR — */
    .sidebar {
      width: 360px; flex-shrink: 0; background: var(--panel);
      border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; z-index: 100;
    }
    .sidebar-header { padding: 28px 28px 20px; border-bottom: 1px solid var(--border); }
    .sidebar-label { font-size: 0.55rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); display: block; margin-bottom: 8px; font-weight: 400; }
    .sidebar-title { font-family: var(--font-serif); font-size: 1.6rem; font-weight: 300; color: var(--bone-bright); line-height: 1.15; letter-spacing: 0.02em; }
    .sidebar-subtitle { margin-top: 8px; font-size: 0.75rem; color: var(--muted); line-height: 1.5; font-weight: 300; }

    /* — FILTER TABS — */
    .filter-bar { padding: 14px 28px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn {
      font-family: var(--font-ui); font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase;
      padding: 5px 10px; border: 1px solid var(--border); background: transparent; color: var(--muted);
      cursor: pointer; transition: all 0.2s; font-weight: 400;
    }
    .filter-btn:hover, .filter-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(184, 150, 62, 0.06); }

    /* — LOCATION LIST — */
    .location-list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .location-list::-webkit-scrollbar { width: 4px; }
    .location-list::-webkit-scrollbar-track { background: transparent; }
    .location-list::-webkit-scrollbar-thumb { background: var(--border); }

    .location-item {
      padding: 18px 28px; border-bottom: 1px solid var(--border); cursor: pointer;
      transition: background 0.2s; position: relative;
    }
    .location-item::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
      background: var(--gold); transform: scaleY(0); transition: transform 0.2s; transform-origin: bottom;
    }
    .location-item[data-color="steel"]::before { background: var(--steel); }
    .location-item[data-color="red"]::before { background: var(--red); }
    .location-item[data-color="bone"]::before { background: var(--bone); }

    .location-item:hover, .location-item.active { background: rgba(184, 150, 62, 0.04); }
    .location-item:hover::before, .location-item.active::before { transform: scaleY(1); }

    .loc-tag {
      font-size: 0.55rem; letter-spacing: 0.3em; text-transform: uppercase;
      margin-bottom: 5px; font-weight: 400; display: flex; align-items: center; gap: 6px;
    }
    .loc-tag-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .loc-name { font-family: var(--font-serif); font-size: 1.1rem; font-weight: 400; color: var(--bone-bright); line-height: 1.2; margin-bottom: 4px; }
    .loc-excerpt { font-size: 0.8rem; color: var(--muted); line-height: 1.5; font-style: italic; font-family: var(--font-serif); }

    /* — DETAIL PANEL — */
    .detail-panel {
      position: absolute; bottom: 0; left: 360px; right: 0;
      background: var(--black); border-top: 1px solid var(--border);
      padding: 24px 36px; transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1); z-index: 200; max-height: 40vh; overflow-y: auto;
    }
    .detail-panel.open { transform: translateY(0); }
    .detail-close { position: absolute; top: 16px; right: 24px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.2rem; line-height: 1; font-family: var(--font-ui); transition: color 0.2s; }
    .detail-close:hover { color: var(--bone-bright); }
    .detail-tag { font-size: 0.55rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; font-weight: 400; display: flex; align-items: center; gap: 8px; }
    .detail-tag-dot { width: 8px; height: 8px; border-radius: 50%; }
    .detail-name { font-family: var(--font-serif); font-size: 1.5rem; font-weight: 300; color: var(--bone-bright); margin-bottom: 6px; letter-spacing: 0.02em; }
    .detail-address { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 16px; font-weight: 300; }
    .detail-body { font-family: var(--font-serif); font-size: 0.95rem; line-height: 1.7; color: #c8c0b0; max-width: 680px; }
    .detail-body em { color: var(--bone-bright); font-style: italic; }
    .detail-chapter { margin-top: 12px; font-size: 0.55rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); font-weight: 300; }

    /* — MAP — */
    #map { flex: 1; height: 100%; background: #0a0908; }
    .leaflet-container { background: #0a0908 !important; font-family: var(--font-ui) !important; }
    .leaflet-control-zoom a { background: var(--panel) !important; color: var(--bone) !important; border-color: var(--border) !important; }
    .leaflet-control-zoom a:hover { background: var(--ink) !important; }

    /* Custom SVG pin */
    .custom-pin { cursor: pointer; transition: transform 0.2s; }
    .custom-pin:hover { transform: scale(1.25); }
    .custom-pin.active { transform: scale(1.3); }

    /* Map labels */
    .map-label {
      font-family: var(--font-serif); font-size: 11px; color: var(--bone);
      white-space: nowrap; text-shadow: 0 0 6px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.7);
      pointer-events: none; opacity: 0; transition: opacity 0.3s;
    }
    .map-label.visible { opacity: 1; }

    /* Leaflet popup */
    .leaflet-popup-content-wrapper { background: var(--panel) !important; border: 1px solid var(--border) !important; border-radius: 0 !important; box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important; padding: 0 !important; }
    .leaflet-popup-content { margin: 0 !important; font-family: var(--font-ui) !important; }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button { display: none !important; }
    .map-popup { padding: 16px 20px; min-width: 200px; }
    .map-popup-tag { font-size: 0.5rem; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 6px; font-weight: 400; display: flex; align-items: center; gap: 6px; }
    .map-popup-tag-dot { width: 5px; height: 5px; border-radius: 50%; }
    .map-popup-name { font-family: var(--font-serif); font-size: 1rem; color: var(--bone-bright); font-weight: 400; margin-bottom: 4px; }
    .map-popup-sub { font-size: 0.7rem; color: var(--muted); font-style: italic; font-family: var(--font-serif); }

    /* — CHARACTER LEGEND — */
    .map-legend {
      position: fixed; top: 52px; left: 360px; right: 0; z-index: 900;
      background: rgba(15, 14, 11, 0.95); border-bottom: 1px solid var(--border);
      padding: 8px 18px; display: flex; gap: 20px; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .legend-label { font-size: 0.55rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); font-weight: 400; }

    /* — SHEET HANDLE (hidden on desktop) — */
    .sheet-handle { display: none; }

    /* — MOBILE FAB + MENU (hidden on desktop) — */
    .mobile-fab { display: none; }
    .mobile-menu-overlay { display: none; }
    .mobile-menu-panel { display: none; }

    /* — MOBILE — */
    @media (max-width: 768px) {
      .site-nav { padding: 10px 16px; height: 44px; }
      .layout { padding-top: 44px; position: relative; overflow: hidden; width: 100vw; max-width: 100%; }
      .nav-center { display: none; }

      /* Map fills viewport below nav + legend */
      #map { position: absolute; top: 72px; left: 0; right: 0; bottom: 0; height: auto; flex: none; z-index: 1; width: 100%; max-width: 100vw; }

      /* Hide desktop sidebar on mobile entirely */
      .sidebar { display: none !important; }

      /* — Floating Action Button — */
      .mobile-fab {
        display: flex; align-items: center; justify-content: center;
        position: fixed; bottom: 24px; right: 16px; z-index: 450;
        width: 50px; height: 50px; border-radius: 50%;
        background: var(--panel); border: 1px solid var(--gold-dim);
        box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        cursor: pointer; -webkit-tap-highlight-color: transparent;
        transition: transform 0.2s, background 0.2s;
      }
      .mobile-fab:active { transform: scale(0.92); }
      .mobile-fab svg { width: 20px; height: 20px; }
      .mobile-fab .fab-lines line { stroke: var(--gold); stroke-width: 2; stroke-linecap: round; }
      .mobile-fab .fab-close { display: none; }
      .mobile-fab.open .fab-lines { display: none; }
      .mobile-fab.open .fab-close { display: block; color: var(--gold); font-size: 1.4rem; line-height: 1; }

      /* — Menu Overlay — */
      .mobile-menu-overlay {
        display: none; position: fixed; inset: 0; z-index: 430;
        background: rgba(0,0,0,0.5); backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
      }
      .mobile-menu-overlay.visible { display: block; }

      /* — Slide-up Menu Panel — */
      .mobile-menu-panel {
        display: block; position: fixed; left: 0; right: 0; bottom: 0; z-index: 440;
        background: var(--panel); border-top: 1px solid var(--gold-dim);
        border-radius: 14px 14px 0 0;
        max-height: 65vh; overflow: hidden;
        transform: translateY(100%);
        transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
      }
      .mobile-menu-panel.open { transform: translateY(0); }

      .mobile-menu-header {
        padding: 16px 20px 0; display: flex; align-items: center; justify-content: space-between;
      }
      .mobile-menu-title {
        font-family: var(--font-serif); font-size: 1.1rem; font-weight: 300;
        color: var(--bone-bright); letter-spacing: 0.02em;
      }
      .mobile-menu-count {
        font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase;
        color: var(--muted); font-weight: 400;
      }
      .mobile-menu-filters {
        padding: 12px 20px; display: flex; gap: 6px; flex-wrap: wrap;
        border-bottom: 1px solid var(--border);
      }
      .mobile-filter-bar { display: flex; gap: 6px; flex-wrap: wrap; padding-bottom: 14px; }
      .mobile-filter-btn {
        font-family: var(--font-ui); font-size: 0.55rem; letter-spacing: 0.18em; text-transform: uppercase;
        padding: 6px 12px; border: 1px solid var(--border); background: transparent; color: var(--muted);
        cursor: pointer; transition: all 0.2s; font-weight: 400; border-radius: 2px;
        -webkit-tap-highlight-color: transparent;
      }
      .mobile-filter-btn:active, .mobile-filter-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(184, 150, 62, 0.08); }

      .mobile-location-list {
        overflow-y: auto; max-height: calc(65vh - 110px);
        scrollbar-width: thin; scrollbar-color: var(--border) transparent;
      }
      .mobile-location-list::-webkit-scrollbar { width: 3px; }
      .mobile-location-list::-webkit-scrollbar-track { background: transparent; }
      .mobile-location-list::-webkit-scrollbar-thumb { background: var(--border); }

      .mobile-loc-item {
        padding: 14px 20px; border-bottom: 1px solid var(--border);
        cursor: pointer; transition: background 0.15s;
        display: flex; align-items: center; gap: 12px;
        -webkit-tap-highlight-color: transparent;
      }
      .mobile-loc-item:active { background: rgba(184, 150, 62, 0.06); }
      .mobile-loc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
      .mobile-loc-info { flex: 1; min-width: 0; }
      .mobile-loc-name {
        font-family: var(--font-serif); font-size: 0.95rem; font-weight: 400;
        color: var(--bone-bright); line-height: 1.2; margin-bottom: 2px;
      }
      .mobile-loc-sub {
        font-size: 0.65rem; color: var(--muted); font-weight: 300;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .mobile-loc-arrow { color: var(--muted); font-size: 0.7rem; flex-shrink: 0; }

      /* Detail panel: centered modal overlay */
      .detail-overlay {
        display: none; position: fixed; inset: 0; z-index: 499;
        background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
      }
      .detail-overlay.visible { display: block; }
      .detail-panel {
        position: fixed; left: 16px; right: 16px; top: auto; bottom: auto;
        top: 50%; transform: translateY(-50%) scale(0.95);
        opacity: 0; pointer-events: none;
        max-height: 70vh; overflow-y: auto;
        padding: 24px 20px 20px; z-index: 500; width: auto;
        border-radius: 10px;
        border: 1px solid var(--gold-dim);
        background: var(--panel);
        box-shadow: 0 16px 48px rgba(0,0,0,0.7);
        transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s ease;
      }
      .detail-panel.open {
        transform: translateY(-50%) scale(1);
        opacity: 1; pointer-events: auto;
      }
      .detail-panel::before { display: none; }
      .detail-close { top: 16px; right: 16px; font-size: 1.4rem; }
      .detail-tag { font-size: 0.5rem; margin-bottom: 6px; }
      .detail-name { font-size: 1.15rem; margin-bottom: 4px; }
      .detail-address { font-size: 0.65rem; margin-bottom: 12px; }
      .detail-body { font-size: 0.82rem; line-height: 1.65; }
      .detail-chapter { font-size: 0.5rem; margin-top: 10px; }

      /* Legend fixed at top on mobile */
      .map-legend {
        top: 44px; left: 0; right: 0;
        padding: 6px 12px; gap: 10px; flex-wrap: nowrap; justify-content: center;
        font-size: 0.5rem; border-bottom: 1px solid var(--border);
      }
      .map-legend.pushed { bottom: auto; top: 44px; }

      /* Prevent anything from exceeding viewport */
      .site-nav { max-width: 100vw; }

      /* Hide FAB when detail panel is open */
      .detail-panel.open ~ .mobile-fab { opacity: 0; pointer-events: none; }
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <a href="/" class="nav-brand">LeRenyae Watkins</a>
    <span class="nav-center"><em>Contempt</em> &mdash; The City</span>
    <span class="nav-right">Baltimore, 2006</span>
  </nav>

  <div class="layout">
    <aside class="sidebar collapsed" id="sidebar">
      <div class="sheet-handle" id="sheetHandle">
        <div class="sheet-handle-bar"></div>
      </div>
      <div class="sheet-toggle-label" id="sheetLabel">Locations</div>
      <div class="sidebar-header">
        <span class="sidebar-label">Field Map</span>
        <div class="sidebar-title">The Places<br>That Held Them</div>
        <p class="sidebar-subtitle">Every location in Contempt. Click to place it.</p>
      </div>
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="baltimore">Baltimore</button>
        <button class="filter-btn" data-filter="ocean-city">Ocean City</button>
        <button class="filter-btn" data-filter="snow-hill">Snow Hill</button>
      </div>
      <div class="location-list" id="locationList"></div>
    </aside>

    <div id="map"></div>

    <div class="detail-overlay" id="detailOverlay"></div>
    <div class="detail-panel" id="detailPanel">
      <button class="detail-close" id="detailClose">&times;</button>
      <div class="detail-tag" id="detailTag"></div>
      <div class="detail-name" id="detailName"></div>
      <div class="detail-address" id="detailAddress"></div>
      <div class="detail-body" id="detailBody"></div>
      <div class="detail-chapter" id="detailChapter"></div>
    </div>
  </div>

  <!-- Character Legend -->
  <div class="map-legend">
    <div class="legend-item"><div class="legend-dot" style="background:#B8963E"></div><span class="legend-label">Shawn</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#4a8ec2"></div><span class="legend-label">Han</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#c44a2a"></div><span class="legend-label">Jordan</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#d4cfc4"></div><span class="legend-label">Institutional</span></div>
  </div>

  <!-- Mobile FAB + Menu -->
  <div class="mobile-fab" id="mobileFab">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </div>

  <div class="mobile-menu-overlay" id="mobileMenuOverlay"></div>

  <div class="mobile-menu-panel" id="mobileMenuPanel">
    <div style="padding: 20px 20px 0; border-bottom: 1px solid var(--border);">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;">
        <div>
          <div style="font-family: var(--font-serif); font-size: 1.15rem; color: var(--bone-bright); font-weight: 400;">Locations</div>
          <div style="font-size: 0.6rem; color: var(--muted); font-weight: 300; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px;">The Places That Held Them</div>
        </div>
        <button id="mobileMenuClose" style="background: none; border: none; color: var(--muted); font-size: 1.6rem; cursor: pointer; padding: 4px 8px; line-height: 1;">&times;</button>
      </div>
      <div class="mobile-filter-bar" id="mobileFilterBar">
        <button class="mobile-filter-btn active" data-filter="all">All</button>
        <button class="mobile-filter-btn" data-filter="baltimore">Baltimore</button>
        <button class="mobile-filter-btn" data-filter="ocean-city">Ocean City</button>
        <button class="mobile-filter-btn" data-filter="snow-hill">Snow Hill</button>
      </div>
    </div>
    <div class="mobile-location-list" id="mobileLocationList"></div>
  </div>

<script>
const COLORS = {
  gold:  { hex: '#B8963E', dim: '#8a6e2a', label: 'Shawn' },
  steel: { hex: '#4a8ec2', dim: '#34658a', label: 'Han' },
  red:   { hex: '#c44a2a', dim: '#8a3520', label: 'Jordan' },
  bone:  { hex: '#d4cfc4', dim: '#8a857a', label: 'Institutional' }
};

const LOCATIONS = [
  // — BALTIMORE (24) —
  {
    id: 1, name: "Mitchell Courthouse Steps",
    address: "100 N Calvert St, Baltimore MD 21202",
    lat: 39.29042, lng: -76.61507, tag: "Baltimore", filter: "baltimore", color: "gold",
    excerpt: "Leo collapses at the microphones.",
    body: "The seal at his back. Uniforms packed tight at the shoulders. Microphones crowded in close, foam tips nearly touching, hungry in the way only a first day can be. <em>Attorney Leo Davidson collapses during statement.</em> The crawl moved through every lobby in the state before Shawn could decide what to do with his hands.",
    chapter: "Chapter One \u2014 Tuesday, August 15, 2006"
  },
  {
    id: 2, name: "Baltimore City Circuit Court",
    address: "111 N Calvert St, Baltimore MD 21202",
    lat: 39.29098, lng: -76.61462, tag: "Baltimore", filter: "baltimore", color: "gold",
    excerpt: "The Moretti trial. Leo\u2019s docket. The room Shawn inherits.",
    body: "Antonio Moretti, nineteen years old, West Baltimore. Charged November 14, 2005 \u2014 the same morning Deputy Mayor Garrick was shot at the Dawson Community Center. The case moves through this building on its own logic, absorbing whoever stands at the table.",
    chapter: "Moretti Intake \u2014 November 14, 2005"
  },
  {
    id: 3, name: "Davidson & Associates",
    address: "100 E Pratt St, Baltimore MD 21202",
    lat: 39.28648, lng: -76.61340, tag: "Baltimore", filter: "baltimore", color: "gold",
    excerpt: "Founded October 20, 1982. The name that opened rooms.",
    body: "Leo Davidson built the firm the way he built everything: with accumulated weight. Forty years of names lined up like receipts. Pinnacle merger, 1998 \u2014 Shawn lead counsel, $4.2 million. <em>Your name is either clean, or it\u2019s useful.</em> Shawn left October 14, 2004. The door stayed open behind him.",
    chapter: "Davidson & Associates Founding \u2014 October 20, 1982"
  },
  {
    id: 4, name: "North Avenue",
    address: "1356 W North Ave, Baltimore MD 21217",

// — SVG Pin Factory —
function pinSVG(color) {
  const hex = COLORS[color].hex;
  return `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="12" cy="12" r="10" stroke="${hex}" stroke-opacity="0.25" stroke-width="1"/>
    <circle cx="12" cy="12" r="6" stroke="${hex}" stroke-opacity="0.5" stroke-width="0.75"/>
    <circle cx="12" cy="12" r="3.5" fill="${hex}"/>
  </svg>`;
}

function pinSVGActive(color) {
  const hex = COLORS[color].hex;
  return `<svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="15" cy="15" r="13" stroke="${hex}" stroke-opacity="0.3" stroke-width="1.5"/>
    <circle cx="15" cy="15" r="8" stroke="${hex}" stroke-opacity="0.6" stroke-width="1"/>
    <circle cx="15" cy="15" r="4.5" fill="${hex}"/>
    <circle cx="15" cy="15" r="13" fill="${hex}" fill-opacity="0.08"/>
  </svg>`;
}

// — Markers & Labels —
const markers = {};
const labels = {};
let activeId = null;
let activeFilter = 'all';

function createPinIcon(loc) {
  return L.divIcon({
    className: '',
    html: `<div class="custom-pin" id="pin-${loc.id}">${pinSVG(loc.color)}</div>`,
    iconSize: [24, 24],
    iconAnchor: [12, 12],
    popupAnchor: [0, -16]
  });
}

function createActiveIcon(loc) {
  return L.divIcon({
    className: '',
    html: `<div class="custom-pin active" id="pin-${loc.id}">${pinSVGActive(loc.color)}</div>`,
    iconSize: [30, 30],
    iconAnchor: [15, 15],
    popupAnchor: [0, -18]
  });
}

function buildPopupHTML(loc) {
  const c = COLORS[loc.color];
  return `<div class="map-popup">
    <div class="map-popup-tag"><span class="map-popup-tag-dot" style="background:${c.hex}"></span><span style="color:${c.dim}">${c.label} \u2014 ${loc.tag}</span></div>
    <div class="map-popup-name">${loc.name}</div>
    <div class="map-popup-sub">${loc.excerpt}</div>
  </div>`;
}

function openDetail(loc) {
  // Reset previous active pin
  if (activeId && markers[activeId]) {
    const prev = LOCATIONS.find(l => l.id === activeId);
    if (prev) markers[activeId].setIcon(createPinIcon(prev));
  }

  const c = COLORS[loc.color];
  document.getElementById('detailTag').innerHTML = `<span class="detail-tag-dot" style="background:${c.hex}"></span>${c.label} \u2014 ${loc.tag}`;
  document.getElementById('detailName').textContent = loc.name;
  document.getElementById('detailAddress').textContent = loc.address;
  document.getElementById('detailBody').innerHTML = loc.body;
  document.getElementById('detailChapter').textContent = loc.chapter;
  document.getElementById('detailPanel').classList.add('open');
  if (window.innerWidth <= 768) document.getElementById('detailOverlay').classList.add('visible');

  // Sidebar highlight
  document.querySelectorAll('.location-item').forEach(el => el.classList.remove('active'));
  const listItem = document.getElementById(`item-${loc.id}`);
  if (listItem) {
    listItem.classList.add('active');
    listItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // Active pin style
  markers[loc.id].setIcon(createActiveIcon(loc));

  map.flyTo([loc.lat, loc.lng], Math.max(map.getZoom(), 14), { duration: 1.0, easeLinearity: 0.4 });
  activeId = loc.id;
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('detailOverlay').classList.remove('visible');
  document.querySelectorAll('.location-item').forEach(el => el.classList.remove('active'));
  if (activeId && markers[activeId]) {
    const prev = LOCATIONS.find(l => l.id === activeId);
    if (prev) markers[activeId].setIcon(createPinIcon(prev));
  }
  activeId = null;
}

// Add markers and labels
LOCATIONS.forEach(loc => {
  const marker = L.marker([loc.lat, loc.lng], { icon: createPinIcon(loc) });
  marker.bindPopup(buildPopupHTML(loc), { maxWidth: 280, className: 'contempt-popup' });
  marker.on('click', () => { map.closePopup(); openDetail(loc); });
  marker.on('mouseover', function() { this.openPopup(); });
  marker.on('mouseout', function() { this.closePopup(); });
  marker.addTo(map);
  markers[loc.id] = marker;

  // Map label (visible at zoom 14+)
  const label = L.marker([loc.lat, loc.lng], {
    icon: L.divIcon({
      className: 'map-label',
      html: loc.name,
      iconSize: [0, 0],
      iconAnchor: [-16, 4]
    }),
    interactive: false
  });
  label.addTo(map);
  labels[loc.id] = label;
});

// Show/hide labels based on zoom — denser clusters need higher zoom
const baltimoreIds = new Set(LOCATIONS.filter(l => l.filter === 'baltimore').map(l => l.id));

function updateLabels() {
  const z = map.getZoom();
  LOCATIONS.forEach(loc => {
    const label = labels[loc.id];
    if (!label) return;
    const el = label.getElement();
    if (!el) return;
    // Baltimore pins are dense — require zoom 16+ to show labels
    // Ocean City / Snow Hill are spread out — show at 14+
    const threshold = baltimoreIds.has(loc.id) ? 16 : 14;
    if (z >= threshold) { el.classList.add('visible'); }
    else { el.classList.remove('visible'); }
  });
}
map.on('zoomend', updateLabels);
map.whenReady(updateLabels);

// — Sidebar List —
function buildList(filter) {
  const list = document.getElementById('locationList');
  list.innerHTML = '';
  const filtered = filter === 'all' ? LOCATIONS : LOCATIONS.filter(l => l.filter === filter);
  filtered.forEach(loc => {
    const c = COLORS[loc.color];
    const item = document.createElement('div');
    item.className = 'location-item';
    item.id = `item-${loc.id}`;
    item.dataset.color = loc.color;
    item.innerHTML = `
      <div class="loc-tag"><span class="loc-tag-dot" style="background:${c.hex}"></span><span style="color:${c.dim}">${loc.tag}</span></div>
      <div class="loc-name">${loc.name}</div>
      <div class="loc-excerpt">${loc.excerpt}</div>
    `;
    item.addEventListener('click', () => openDetail(loc));
    list.appendChild(item);
  });
}
buildList('all');

// — Filter Buttons —
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    buildList(activeFilter);
    closeDetail();

    LOCATIONS.forEach(loc => {
      if (activeFilter === 'all' || loc.filter === activeFilter) {
        markers[loc.id].addTo(map);
        labels[loc.id].addTo(map);
      } else {
        map.removeLayer(markers[loc.id]);
        map.removeLayer(labels[loc.id]);
      }
    });

    if (activeFilter === 'baltimore') {
      map.flyTo([39.295, -76.615], 13, { duration: 1.0 });
    } else if (activeFilter === 'ocean-city') {
      map.flyTo([38.345, -75.078], 14, { duration: 1.0 });
    } else if (activeFilter === 'snow-hill') {
      map.flyTo([38.176, -75.390], 15, { duration: 1.0 });
    } else {
      map.flyTo([39.29, -76.615], 13, { duration: 1.0 });
    }
  });
});

document.getElementById('detailClose').addEventListener('click', closeDetail);
document.getElementById('detailOverlay').addEventListener('click', closeDetail);

  if (window.innerWidth <= 768) {
    sidebar.classList.add('collapsed');
    sheetLabel.textContent = 'Locations';
  }
}

function expandSidebar() {
  sidebar.classList.remove('collapsed');
  sheetLabel.textContent = '';
}

function toggleSheet() {
  if (sidebar.classList.contains('collapsed')) {
    expandSidebar();
  } else {
    collapseSidebar();
  }
}

sheetHandle.addEventListener('click', toggleSheet);
sheetLabel.addEventListener('click', toggleSheet);

    const c = COLORS[loc.color];
    const item = document.createElement('div');
    item.className = 'mobile-loc-item';
    item.innerHTML = `
      <div class="mobile-loc-dot" style="background:${c.hex}"></div>
      <div class="mobile-loc-info">
        <div class="mobile-loc-name">${loc.name}</div>
        <div class="mobile-loc-sub">${loc.excerpt}</div>
      </div>
      <div class="mobile-loc-arrow">&rsaquo;</div>
    `;
    item.addEventListener('click', () => {
      closeMobileMenu();
      openDetail(loc);
    });
    mobileLocationList.appendChild(item);
  });
}

if (mobileFab) {
  mobileFab.addEventListener('click', openMobileMenu);
  mobileMenuOverlay.addEventListener('click', closeMobileMenu);
  mobileMenuClose.addEventListener('click', closeMobileMenu);

  // Mobile filter buttons
  document.querySelectorAll('.mobile-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mobile-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      mobileFilter = btn.dataset.filter;
      buildMobileList(mobileFilter);

      // Also update map markers
      LOCATIONS.forEach(loc => {
        if (mobileFilter === 'all' || loc.filter === mobileFilter) {
          markers[loc.id].addTo(map);
          labels[loc.id].addTo(map);
        } else {
          map.removeLayer(markers[loc.id]);
          map.removeLayer(labels[loc.id]);
        }
      });

      if (mobileFilter === 'baltimore') {
        map.flyTo([39.295, -76.615], 13, { duration: 1.0 });
      } else if (mobileFilter === 'ocean-city') {
        map.flyTo([38.345, -75.078], 14, { duration: 1.0 });
      } else if (mobileFilter === 'snow-hill') {
        map.flyTo([38.176, -75.390], 15, { duration: 1.0 });
      } else {
        map.flyTo([39.29, -76.615], 13, { duration: 1.0 });
      }
    });
  });

  // Build initial mobile list
  buildMobileList('all');
}
</script>
</body>
</html>
